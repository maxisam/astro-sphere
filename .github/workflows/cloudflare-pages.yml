name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Set Astro base and site
        shell: bash
        run: |
          if [ -n "${CLOUDFLARE_PAGES_DOMAIN:-}" ]; then
            echo "ASTRO_SITE=https://${CLOUDFLARE_PAGES_DOMAIN}/" >> "$GITHUB_ENV"
          else
            echo "ASTRO_SITE=https://${CLOUDFLARE_PAGES_PROJECT}.pages.dev/" >> "$GITHUB_ENV"
          fi
          echo "ASTRO_BASE=/" >> "$GITHUB_ENV"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "CF_PAGES_BRANCH=${GITHUB_HEAD_REF}" >> "$GITHUB_ENV"
          else
            echo "CF_PAGES_BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi
        env:
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
          CLOUDFLARE_PAGES_DOMAIN: ${{ vars.CLOUDFLARE_PAGES_DOMAIN }}

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ env.CF_PAGES_BRANCH }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
