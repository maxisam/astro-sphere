name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-cloudflare:
    runs-on: ubuntu-latest
    environment: cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Set Astro base and site
        shell: bash
        run: |
          if [ -n "${CLOUDFLARE_PAGES_DOMAIN:-}" ]; then
            echo "ASTRO_SITE=https://${CLOUDFLARE_PAGES_DOMAIN}/" >> "$GITHUB_ENV"
          else
            echo "ASTRO_SITE=https://${CLOUDFLARE_PAGES_PROJECT}.pages.dev/" >> "$GITHUB_ENV"
          fi
          echo "ASTRO_BASE=/" >> "$GITHUB_ENV"
          echo "CF_PAGES_BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
        env:
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
          CLOUDFLARE_PAGES_DOMAIN: ${{ vars.CLOUDFLARE_PAGES_DOMAIN }}

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ env.CF_PAGES_BRANCH }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-gh-pages:
    runs-on: ubuntu-latest
    needs: deploy-cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Set Astro base and site
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%/*}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            echo "ASTRO_BASE=/" >> "$GITHUB_ENV"
            echo "ASTRO_SITE=https://$OWNER.github.io/" >> "$GITHUB_ENV"
          else
            echo "ASTRO_BASE=/$REPO" >> "$GITHUB_ENV"
            echo "ASTRO_SITE=https://$OWNER.github.io/$REPO/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          clean-exclude: |
            pr-preview
          force: false
